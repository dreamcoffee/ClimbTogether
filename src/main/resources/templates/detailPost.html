<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 상세보기</title>
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/basic-form.css">
    <link rel="stylesheet" href="/css/comment.css"> </head>
</head>
<body>
<div th:replace="~{fragments/nav_fragment :: navBar}"></div>

<div class="main-container content-padding">

    <div class="post-view">

        <div class="post-header">
            <h2 th:text="${postDetail.postname}">제목</h2>
        </div>

        <div class="post-meta">
            <div>
                <span class="meta-label">작성자:</span>
                <span th:text="${postDetail.writerName}"></span>
            </div>
        </div>

        <div class="post-content">
            <p th:text="${postDetail.postdetail}"></p>
        </div>
    </div>

    <div class="main-container detail-action-wrapper">
        <div class="detail-actions">
            <button onclick="goList()" class="list-button">목록</button>
            <th:block th:if="${session.loginId != null and session.loginId == postDetail.member_id}">
                <button onclick="goUpdate()" class="primary-action-button">수정</button>
                <button onclick="goDelete()" class="primary-action-button">삭제</button>
            </th:block>
        </div>
    </div>
</div>
<div class="main-container">
    <div class="main-container comment-section">
        <h3 class="comment-section-title">댓글 (<span th:text="${commentList.size()}">0</span>)</h3>

        <div th:if="${session.loginId != null}" class="comment-input-form">
            <form th:action="@{/addComment}" method="post" class="comment-form">
                <input type="hidden" name="postId" th:value="${postDetail.postid}">
                <input type="text" name="commentDetail" placeholder="댓글을 입력하세요." class="comment-input" required>
                <button type="submit" class="save-button comment-submit-button">등록</button>
            </form>
        </div>
        <div th:unless="${session.loginId != null}" class="comment-login-message">
            댓글을 작성하려면 <a th:href="@{/login}">로그인</a>이 필요합니다.
        </div>

        <div class="comment-list">
            <div th:each="comment : ${commentList}" class="comment-item">
                <div class="comment-header">
                    <span th:text="${comment.writerName}" class="comment-writer"></span>
                </div>
                <p th:text="${comment.commentDetail}" class="comment-content-text"></p>
            </div>

            <div th:if="${commentList.empty}" class="comment-empty-message">
                첫 번째 댓글을 작성해 보세요!
            </div>
        </div>
    </div>
</div>
</body>

<script th:inline="javascript">
    /* 목록으로 이동하기 버튼 */
    const goList = () => {
        location.href = "/community";
    }

    /* 수정하기 버튼 */
    const goUpdate = () => {
        if (confirm("수정하시겠습니까?")) {
            location.href = "/goUpdate/[[${postDetail.postid}]]";
        }
    }

    /* 삭제하기 버튼 */
    const goDelete = () => {
        if (confirm("삭제하시겠습니까?")) {
            location.href = "/goDelete/[[${postDetail.postid}]]";
        }
    }

</script>
</html>
