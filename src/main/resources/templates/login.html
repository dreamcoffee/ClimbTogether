<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>login</title>
    <link rel="stylesheet" href="/css/signup.css">
    <link rel="stylesheet" href="/css/nav.css">
</head>
<body>
<div th:replace="~{fragments/nav_fragment :: navBar}"></div>

<div class="content-padding">
    <div class="signup-container">
        <h2>로그인</h2>
        <p th:if="${errorMessage}" th:text="${errorMessage}"
           style="color: red; font-weight: bold; margin-bottom: 15px;"></p>
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="member_id">아이디</label>
                <input type="text" id="member_id" name="member_id" maxlength="15" required>
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" maxlength="20" required>
            </div>

            <button type="submit" class="signup-button">로그인</button>
        </form>
        <div class="signup-link">
            <br>
            계정이 없으신가요? <a onclick="goSignup()">회원가입</a>
        </div>
    </div>
</div>
</body>
<script th:inline="javascript">
    /* 목록으로 이동하기 버튼 */
    const goSignup = () => {
        location.href = "/signup";
    }
</script>
</html>
