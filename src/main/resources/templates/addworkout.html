<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>운동 기록 추가</title>
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/basic-form.css">
    <style>
        /* CSS는 basic-form.css에 의존하며, 폼 컨테이너 스타일을 사용합니다. */
        .color-input-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .color-label {
            display: flex;
            align-items: center;
            width: 120px;
            font-weight: bold;
        }
        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 10px;
            border: 1px solid #333;
        }
        .count-input {
            width: 80px;
            padding: 8px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .record-info-group {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .record-info-group input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav_fragment :: navBar}"></div>

<div class="main-container page-content">
    <div class="post-form-container" style="max-width: 550px;">
        <h2>클라이밍 기록 추가</h2>

        <form th:action="@{/addworkout}" method="post" th:object="${workoutRequest}">

            <div class="record-info-group">
                <div class="post-form-group">
                    <label for="branch">지점 (예: 양재, 강남)</label>
                    <input type="text" id="branch" name="records[0].branch" placeholder="지점명" required>
                </div>

                <div class="post-form-group">
                    <label for="recordDate">기록 날짜</label>
                    <input type="date" id="recordDate" name="records[0].recordDate" th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required>
                </div>
            </div>

            <div th:with="colors=${ {'WHITE', 'YELLOW', 'ORANGE', 'GREEN', 'BLUE', 'RED', 'PURPLE', 'BROWN'} }">
                <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">난이도별 완등 개수</h3>

                <div th:each="color, stat : ${colors}" class="color-input-group">

                    <label class="color-label">
                        <span class="color-box" th:style="'background-color:' + ${color}"></span>
                        <span th:text="${color}"></span>
                    </label>

                    <input type="hidden" th:name="'records[' + ${stat.index} + '].difficultyColor'" th:value="${color}">
                    <input type="number"
                           th:name="'records[' + ${stat.index} + '].solvedCount'"
                           class="count-input"
                           placeholder="개수"
                           value="0"
                           min="0">
                </div>
            </div>

            <input type="submit" value="기록 저장" class="save-button" style="margin-top: 20px; width: 100%;">
        </form>
    </div>
</div>
</body>
</html>
