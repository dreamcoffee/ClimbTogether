<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="/css/signup.css">
    <link rel="stylesheet" href="/css/nav.css">
</head>
<body>
<div th:replace="~{fragments/nav_fragment :: navBar}"></div>

<div class="signup-container">
    <h2>회원가입</h2>
    <form action="/signup" method="POST" enctype="multipart/form-data" th:object="${memberDTO}">
        <div class="input-group">
            <label for="Name">닉네임</label>
            <input type="text" id="Name" name="name" th:field="*{name}"required>
            <span class="error-message"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}">
                (닉네임 오류 메시지 표시 영역)
            </span>
        </div>

        <div class="input-group">
            <label for="userid">아이디</label>
            <input type="text" id="userid" name="member_id" maxlength="15" th:field="*{member_id}" required>
            <span class="error-message"
                  th:if="${#fields.hasErrors('member_id')}"
                  th:errors="*{member_id}">
                (아이디 오류 메시지 표시 영역)
            </span>
        </div>

        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" maxlength="20" th:field="*{password}" required>
            <span class="error-message"
                  th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}">
                (비밀번호 오류 메시지 표시 영역)
            </span>
        </div>

        <button type="submit" class="signup-button">가입하기</button>
    </form>
</div>
</body>
</html>
